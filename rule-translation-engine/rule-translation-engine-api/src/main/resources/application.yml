spring:
  application:
    name: rule-translation-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pqvcf_regulations}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

pqvcf:
  nlp:
    url: ${PQVCF_NLP_URL:http://localhost:5001/extract}

server:
  port: 8082

logging:
  level:
    root: INFO
    com.pqvcf: DEBUG
